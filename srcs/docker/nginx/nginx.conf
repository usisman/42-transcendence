events {}
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  server {
    listen 80;
    server_name _;

    return 301 https://$host:8443$request_uri;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;
    ssl_certificate     /etc/nginx/certs/localhost.pem;
    ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location ~* ^/grafana/public/build/.*\.map$ {
        auth_basic off;
        proxy_pass http://grafana:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

location /grafana/ {
      auth_basic "Grafana";
      auth_basic_user_file /etc/nginx/htpasswd;
      proxy_pass http://grafana:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /grafana;
      proxy_set_header Accept-Encoding "";
      sub_filter_types text/html;
      sub_filter '</head>' '<meta name="mobile-web-app-capable" content="yes"></head>';
      sub_filter '</body>' '<script>(function(){var counter=0;function fix(){var inputs=document.querySelectorAll("input:not([id]):not([name])");for(var i=0;i<inputs.length;i++){var el=inputs[i];var key="auto-input-"+(counter++);el.id=key;el.name=key;}}fix();try{var obs=new MutationObserver(function(){fix();});obs.observe(document.documentElement,{childList:true,subtree:true});}catch(e){}})();</script></body>';
      sub_filter_once on;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_redirect off;
    }

    location / {
      proxy_pass http://frontend:5173;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_redirect off;
    }

    location /ws/ {
      proxy_pass http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_redirect off;
    }

    location /api/ {
      proxy_pass http://backend:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Prefix /grafana;
      proxy_set_header Accept-Encoding "";
      sub_filter_types text/html;
      sub_filter '</head>' '<meta name="mobile-web-app-capable" content="yes"></head>';
      sub_filter '</body>' '<script>(function(){var counter=0;function fix(){var inputs=document.querySelectorAll("input:not([id]):not([name])");for(var i=0;i<inputs.length;i++){var el=inputs[i];var key="auto-input-"+(counter++);el.id=key;el.name=key;}}fix();try{var obs=new MutationObserver(function(){fix();});obs.observe(document.documentElement,{childList:true,subtree:true});}catch(e){}})();</script></body>';
      sub_filter_once on;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
      proxy_redirect off;
    }
  }
}
